<h1>💬 Chat nocturno</h1>

<div id="chat"></div>

<input id="msg" placeholder="Escribe algo">

<button onclick="enviar()">Enviar</button>

<script>

function enviar(){

let texto = document.getElementById("msg").value

let div = document.createElement("p")

div.innerText = texto

document.getElementById("chat").appendChild(div)

}

</script>
